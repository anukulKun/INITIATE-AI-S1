version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/db:/app/db

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.local
    depends_on:
      - backend
